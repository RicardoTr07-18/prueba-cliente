spring:
  application:
    name: api-gateway

  main:
    lazy-initialization: true        # ⚡ Carga diferida de beans para arrancar más rápido
    banner-mode: off

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

  cloud:
    config:
      request-read-timeout: 2000
      retry:
        max-attempts: 2
        initial-interval: 1000

    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
      server:
        webflux:
          routes:
            # --- Auth Service ---
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/auth/**

            # --- User Service ---
            - id: user-service
              uri: lb://auth-service
              predicates:
                - Path=/api/user/**

            # --- Catalog Service ---
            - id: catalog-service
              uri: lb://catalog-service
              predicates:
                - Path=/api/informationcetpro/**,
                       /api/matricula/**,
                       /api/report/grades/**,
                       /api/report/matricula/**,
                       /api/modules/**,
                       /api/report/modules/**,
                       /api/periods/**,
                       /api/seccion/**,
                       /api/cycles/**,
                       /api/conditions/**,
                       /api/specialty/**,
                       /api/student/**,
                       /api/teacher/**,
                       /api/report/teacher/**,
                       /api/turno/**
            
            # --- Finance Service ---
            - id: finance-service
              uri: lb://finance-service
              predicates:
                - Path=/api/finance/**

            # --- AI Service ---
            - id: ai-service
              uri: lb://ai-service
              predicates:
                - Path=/api/ai/**
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    registry-fetch-interval-seconds: 30
    initial-instance-info-replication-interval-seconds: 30

server:
  port: 8081

management:
  metrics:
    tags:
      application: ${spring.application.name}
  endpoints:
    web:
      exposure:
        include: info, health, prometheus
  info:
    env: 
      enabled: true

jwt:
  secret: 08725e547914eb52b7abba9bdfe7be4a2a5e6b8d9ca977d84a20816ff4f5023c

logging:
  level:
    root: warn
    org.springframework: info

